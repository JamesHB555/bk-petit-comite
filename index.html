<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>BK — Petit Comité</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }

    /* LOGIN */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 40px; width: 360px; }
    .login-box h1 { font-size: 20px; margin-bottom: 8px; }
    .login-box p { color: #888; font-size: 14px; margin-bottom: 24px; }
    .login-box input { width: 100%; padding: 10px 12px; background: #0f0f0f; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 14px; margin-bottom: 12px; }
    .login-box button { width: 100%; padding: 10px; background: #c9a84c; border: none; border-radius: 6px; color: #000; font-weight: 600; cursor: pointer; font-size: 14px; }
    #login-error { color: #e05555; font-size: 13px; margin-top: 10px; display: none; }

    /* APP */
    #app-screen { display: none; }
    header { background: #1a1a1a; border-bottom: 1px solid #333; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 16px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-right span { color: #888; font-size: 13px; }
    .btn-logout { background: none; border: 1px solid #444; border-radius: 4px; color: #888; padding: 6px 12px; cursor: pointer; font-size: 13px; }
    .btn-save-all { background: #c9a84c; border: none; border-radius: 6px; color: #000; font-weight: 600; padding: 8px 18px; cursor: pointer; font-size: 14px; }
    .btn-save-all:disabled { background: #555; color: #888; cursor: default; }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

    /* BLOQUES */
    .bloque { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; margin-bottom: 24px; overflow: hidden; }
    .bloque-header { padding: 16px 20px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .bloque-header h2 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #c9a84c; }
    .bloque-header .toggle { color: #555; font-size: 18px; }
    .bloque-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .bloque-body.collapsed { display: none; }

    /* CAMPO */
    .campo { display: flex; flex-direction: column; gap: 6px; }
    .campo label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
    .campo textarea { background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 6px; color: #e0e0e0; padding: 12px; font-size: 14px; font-family: inherit; line-height: 1.6; resize: vertical; min-height: 80px; transition: border-color 0.2s; }
    .campo textarea:focus { outline: none; border-color: #c9a84c; }
    .campo textarea.modified { border-color: #c9a84c55; }
    .campo-meta { display: flex; gap: 12px; align-items: center; }
    .campo-meta span { font-size: 11px; color: #555; }
    .badge-aprobado { background: #1a2a1a; color: #6abf6a; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .badge-borrador { background: #2a2a2a; color: #888; padding: 2px 8px; border-radius: 10px; font-size: 11px; }

    /* TOAST */
    #toast { position: fixed; bottom: 24px; right: 24px; background: #1a2a1a; border: 1px solid #3a5a3a; color: #6abf6a; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; z-index: 100; }
    #toast.error { background: #2a1a1a; border-color: #5a3a3a; color: #e05555; }

    /* EVENTOS PÚBLICOS */
    .eventos-header { padding: 16px 20px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
    .eventos-header-left { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
    .eventos-header-left h2 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #c9a84c; }
    .btn-nuevo-evento { background: #c9a84c; border: none; border-radius: 6px; color: #000; font-weight: 600; padding: 7px 14px; cursor: pointer; font-size: 13px; white-space: nowrap; }
    .eventos-filtros { display: flex; gap: 8px; padding: 14px 20px; border-bottom: 1px solid #2a2a2a; }
    .filtro-btn { background: none; border: 1px solid #333; border-radius: 20px; color: #888; padding: 4px 14px; cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.15s; }
    .filtro-btn.active { background: #c9a84c22; border-color: #c9a84c; color: #c9a84c; }
    .eventos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 20px; }
    @media (max-width: 700px) { .eventos-grid { grid-template-columns: 1fr; } }
    .evento-card { background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 0.15s; }
    .evento-card:hover { border-color: #c9a84c55; }
    .evento-card-nombre { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #e0e0e0; }
    .evento-card-meta { font-size: 12px; color: #666; margin-bottom: 4px; }
    .evento-card-precio { font-size: 13px; font-weight: 600; color: #c9a84c; margin-top: 8px; }
    .badge-activo { background: #1a2a1a; color: #6abf6a; padding: 2px 8px; border-radius: 10px; font-size: 11px; display: inline-block; margin-top: 8px; }
    .badge-inactivo { background: #2a2a2a; color: #888; padding: 2px 8px; border-radius: 10px; font-size: 11px; display: inline-block; margin-top: 8px; }
    .eventos-empty { padding: 32px; text-align: center; color: #555; font-size: 14px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 15px; font-weight: 600; }
    .modal-close { background: none; border: none; color: #666; font-size: 22px; cursor: pointer; line-height: 1; }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .modal-field { display: flex; flex-direction: column; gap: 5px; }
    .modal-field label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
    .modal-field input, .modal-field textarea, .modal-field select { background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 6px; color: #e0e0e0; padding: 10px 12px; font-size: 14px; font-family: inherit; width: 100%; }
    .modal-field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .modal-field input:focus, .modal-field textarea:focus { outline: none; border-color: #c9a84c; }
    .modal-field-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
    .toggle-activo { display: flex; align-items: center; gap: 10px; }
    .toggle-activo label { font-size: 13px; color: #e0e0e0; font-weight: normal; text-transform: none; letter-spacing: 0; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .btn-guardar-evento { background: #c9a84c; border: none; border-radius: 6px; color: #000; font-weight: 600; padding: 9px 20px; cursor: pointer; font-size: 14px; }
    .btn-eliminar-evento { background: none; border: 1px solid #5a3a3a; border-radius: 6px; color: #e05555; padding: 9px 16px; cursor: pointer; font-size: 13px; }
    .btn-cancelar-evento { background: none; border: 1px solid #333; border-radius: 6px; color: #888; padding: 9px 16px; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Base de Conocimiento</h1>
    <p>Petit Comité — acceso restringido</p>
    <input type="text" id="username" placeholder="Usuario" />
    <input type="password" id="password" placeholder="Contraseña" />
    <button onclick="login()">Entrar</button>
    <div id="login-error">Usuario o contraseña incorrectos.</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <h1>Base de Conocimiento — Petit Comité</h1>
    <div class="header-right">
      <span id="user-label"></span>
      <button class="btn-save-all" id="btn-guardar" onclick="guardarCambios()" disabled>Guardar cambios</button>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </header>
  <div class="container" id="contenido-bk">
    <p style="color:#555; text-align:center; padding:40px;">Cargando...</p>
  </div>
</div>

<!-- MODAL EVENTO -->
<div id="modal-evento" class="modal-overlay" style="display:none;" onclick="cerrarModalSiFuera(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-titulo">Nuevo evento</h3>
      <button class="modal-close" onclick="cerrarModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Nombre del taller</label>
        <input type="text" id="ev-nombre" placeholder="Ej. Taller de Introducción al Vino" />
      </div>
      <!-- FECHA 1 -->
      <div class="modal-field-row">
        <div class="modal-field">
          <label>Fecha</label>
          <input type="date" id="ev-fecha" />
        </div>
        <div class="modal-field">
          <label>Hora inicio</label>
          <input type="text" id="ev-hora-inicio" placeholder="Ej. 7:00 PM" />
        </div>
        <div class="modal-field">
          <label>Hora fin</label>
          <input type="text" id="ev-hora-fin" placeholder="Ej. 9:00 PM" />
        </div>
      </div>
      <!-- FECHA 2 (opcional) -->
      <div id="fecha2-block" style="display:none; border:1px solid #2a2a2a; border-radius:8px; padding:14px; position:relative;">
        <div style="font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Segunda fecha</div>
        <div class="modal-field-row">
          <div class="modal-field">
            <label>Fecha</label>
            <input type="date" id="ev-fecha-2" />
          </div>
          <div class="modal-field">
            <label>Hora inicio</label>
            <input type="text" id="ev-hora-inicio-2" placeholder="Ej. 7:00 PM" />
          </div>
          <div class="modal-field">
            <label>Hora fin</label>
            <input type="text" id="ev-hora-fin-2" placeholder="Ej. 9:00 PM" />
          </div>
        </div>
        <button onclick="quitarFecha2()" style="position:absolute;top:10px;right:12px;background:none;border:none;color:#555;font-size:18px;cursor:pointer;line-height:1;">×</button>
      </div>
      <button id="btn-agregar-fecha2" onclick="mostrarFecha2()" style="background:none;border:1px dashed #444;border-radius:6px;color:#888;padding:8px 14px;cursor:pointer;font-size:13px;width:100%;text-align:center;">＋ Agregar segunda fecha</button>
      <div class="modal-field-row">
        <div class="modal-field">
          <label>Precio</label>
          <input type="text" id="ev-precio" placeholder="Ej. $850 MXN por persona" />
        </div>
        <div class="modal-field">
          <label>Formato</label>
          <select id="ev-formato">
            <option value="Presencial">Presencial</option>
            <option value="Online">Online</option>
            <option value="Híbrido">Híbrido</option>
          </select>
        </div>
      </div>
      <div class="modal-field">
        <label>Contenido (de qué trata)</label>
        <textarea id="ev-contenido" rows="3"></textarea>
      </div>
      <div class="modal-field">
        <label>Texto comercial (copy para vender)</label>
        <textarea id="ev-texto-comercial" rows="4"></textarea>
      </div>
      <div class="modal-field">
        <label>Qué incluye</label>
        <textarea id="ev-que-incluye" rows="3"></textarea>
      </div>
      <div class="modal-field">
        <label>Instrucciones extra</label>
        <textarea id="ev-instrucciones" rows="2"></textarea>
      </div>
      <div class="modal-field toggle-activo">
        <input type="checkbox" id="ev-activo" checked style="width:auto;" />
        <label for="ev-activo">Evento activo (visible para agentes)</label>
      </div>
    </div>
    <div class="modal-footer">
      <div>
        <button class="btn-eliminar-evento" id="btn-eliminar" onclick="eliminarEvento()" style="display:none;">Eliminar</button>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn-cancelar-evento" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-guardar-evento" onclick="guardarEvento()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  function formatFechaHora(fecha, hIni, hFin) {
    if (!fecha) return '—';
    const fmt = new Date(fecha + 'T12:00:00').toLocaleDateString('es-MX', {weekday:'short', day:'numeric', month:'short'});
    const horas = hIni ? (hFin ? `${hIni} – ${hFin}` : hIni) : '';
    return horas ? `${fmt} · ${horas}` : fmt;
  }

  function mostrarFecha2() {
    document.getElementById('fecha2-block').style.display = 'block';
    document.getElementById('btn-agregar-fecha2').style.display = 'none';
  }

  function quitarFecha2() {
    document.getElementById('fecha2-block').style.display = 'none';
    document.getElementById('btn-agregar-fecha2').style.display = 'block';
    document.getElementById('ev-fecha-2').value = '';
    document.getElementById('ev-hora-inicio-2').value = '';
    document.getElementById('ev-hora-fin-2').value = '';
  }

  const SUPABASE_URL = 'https://nxurezlgjkhlzaatccyd.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_bZBzQNpPPcpvx1PtR1lXHQ_yUywEH_U';
  const NEGOCIO = 'Petit Comité';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let documentos = [];
  let modificados = {};
  let eventos = [];
  let filtroEventos = 'todos';
  let eventoEditandoId = null;

  async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const hash = await hashPassword(password);
    const { data, error } = await sb.from('bk_usuarios').select('*').eq('username', username).eq('password_hash', hash).eq('activo', true).single();
    if (error || !data) {
      document.getElementById('login-error').style.display = 'block';
    } else {
      currentUser = data;
      sessionStorage.setItem('bk_user', JSON.stringify(data));
      mostrarApp();
    }
  }

  function logout() {
    currentUser = null;
    sessionStorage.removeItem('bk_user');
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  async function mostrarApp() {
    document.getElementById('user-label').textContent = currentUser.username;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    await Promise.all([cargarEventos(), cargarBK()]);
  }

  // ── EVENTOS PÚBLICOS ────────────────────────────────────────────────────────

  async function cargarEventos() {
    const { data, error } = await sb.from('eventos_publicos').select('*').eq('negocio', NEGOCIO).order('fecha');
    if (error || !data) return;
    eventos = data;
    renderEventos();
  }

  function renderEventos() {
    const container = document.getElementById('eventos-section');
    if (!container) return;

    let lista = eventos;
    if (filtroEventos === 'activos') lista = eventos.filter(e => e.activo);
    if (filtroEventos === 'inactivos') lista = eventos.filter(e => !e.activo);

    const grid = document.getElementById('eventos-grid');
    if (!grid) return;

    if (lista.length === 0) {
      grid.innerHTML = '<div class="eventos-empty">Sin eventos para mostrar.</div>';
      return;
    }

    grid.innerHTML = lista.map(ev => `
      <div class="evento-card" onclick="abrirModal('${ev.id}')">
        <div class="evento-card-nombre">${ev.nombre}</div>
        <div class="evento-card-meta">${formatFechaHora(ev.fecha, ev.hora_inicio, ev.hora_fin)}</div>
        ${ev.fecha_2 ? `<div class="evento-card-meta">${formatFechaHora(ev.fecha_2, ev.hora_inicio_2, ev.hora_fin_2)}</div>` : ''}
        <div class="evento-card-precio">${ev.precio || '—'}</div>
        <span class="${ev.activo ? 'badge-activo' : 'badge-inactivo'}">${ev.activo ? 'Activo' : 'Inactivo'}</span>
      </div>
    `).join('');
  }

  function setFiltro(f) {
    filtroEventos = f;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('filtro-' + f).classList.add('active');
    renderEventos();
  }

  function toggleEventosBody(el) {
    const body = document.getElementById('eventos-body');
    const toggle = el.querySelector('.toggle');
    body.classList.toggle('collapsed');
    toggle.textContent = body.classList.contains('collapsed') ? '▸' : '▾';
  }

  function abrirModal(id) {
    eventoEditandoId = id || null;
    const ev = id ? eventos.find(e => e.id === id) : null;
    document.getElementById('modal-titulo').textContent = ev ? 'Editar evento' : 'Nuevo evento';
    document.getElementById('ev-nombre').value = ev ? ev.nombre : '';
    document.getElementById('ev-fecha').value = ev ? (ev.fecha || '') : '';
    document.getElementById('ev-hora-inicio').value = ev ? (ev.hora_inicio || '') : '';
    document.getElementById('ev-hora-fin').value = ev ? (ev.hora_fin || '') : '';
    document.getElementById('ev-fecha-2').value = ev ? (ev.fecha_2 || '') : '';
    document.getElementById('ev-hora-inicio-2').value = ev ? (ev.hora_inicio_2 || '') : '';
    document.getElementById('ev-hora-fin-2').value = ev ? (ev.hora_fin_2 || '') : '';
    const tieneFecha2 = ev && ev.fecha_2;
    document.getElementById('fecha2-block').style.display = tieneFecha2 ? 'block' : 'none';
    document.getElementById('btn-agregar-fecha2').style.display = tieneFecha2 ? 'none' : 'block';
    document.getElementById('ev-precio').value = ev ? (ev.precio || '') : '';
    document.getElementById('ev-formato').value = ev ? (ev.formato || 'Presencial') : 'Presencial';
    document.getElementById('ev-contenido').value = ev ? (ev.contenido || '') : '';
    document.getElementById('ev-texto-comercial').value = ev ? (ev.texto_comercial || '') : '';
    document.getElementById('ev-que-incluye').value = ev ? (ev.que_incluye || '') : '';
    document.getElementById('ev-instrucciones').value = ev ? (ev.instrucciones_extra || '') : '';
    document.getElementById('ev-activo').checked = ev ? ev.activo : true;
    const btnElim = document.getElementById('btn-eliminar');
    btnElim.style.display = (ev && currentUser.rol === 'admin') ? 'inline-block' : 'none';
    document.getElementById('modal-evento').style.display = 'flex';
  }

  function cerrarModal() {
    document.getElementById('modal-evento').style.display = 'none';
    eventoEditandoId = null;
  }

  function cerrarModalSiFuera(e) {
    if (e.target === document.getElementById('modal-evento')) cerrarModal();
  }

  async function guardarEvento() {
    const payload = {
      negocio: NEGOCIO,
      nombre: document.getElementById('ev-nombre').value.trim(),
      fecha: document.getElementById('ev-fecha').value || null,
      hora_inicio: document.getElementById('ev-hora-inicio').value.trim(),
      hora_fin: document.getElementById('ev-hora-fin').value.trim(),
      fecha_2: document.getElementById('ev-fecha-2').value || null,
      hora_inicio_2: document.getElementById('ev-hora-inicio-2').value.trim(),
      hora_fin_2: document.getElementById('ev-hora-fin-2').value.trim(),
      precio: document.getElementById('ev-precio').value.trim(),
      formato: document.getElementById('ev-formato').value,
      contenido: document.getElementById('ev-contenido').value.trim(),
      texto_comercial: document.getElementById('ev-texto-comercial').value.trim(),
      que_incluye: document.getElementById('ev-que-incluye').value.trim(),
      instrucciones_extra: document.getElementById('ev-instrucciones').value.trim(),
      activo: document.getElementById('ev-activo').checked,
      fecha_actualizacion: new Date().toISOString(),
    };
    if (!payload.nombre) { mostrarToast('El nombre es obligatorio', true); return; }

    let error;
    if (eventoEditandoId) {
      ({ error } = await sb.from('eventos_publicos').update(payload).eq('id', eventoEditandoId));
    } else {
      ({ error } = await sb.from('eventos_publicos').insert(payload));
    }
    if (error) { mostrarToast('Error al guardar', true); return; }
    cerrarModal();
    mostrarToast('Evento guardado');
    await cargarEventos();
  }

  async function eliminarEvento() {
    if (!eventoEditandoId) return;
    if (!confirm('¿Eliminar este evento?')) return;
    const { error } = await sb.from('eventos_publicos').delete().eq('id', eventoEditandoId);
    if (error) { mostrarToast('Error al eliminar', true); return; }
    cerrarModal();
    mostrarToast('Evento eliminado');
    await cargarEventos();
  }

  // ── BK EXISTENTE ────────────────────────────────────────────────────────────

  async function cargarBK() {
    const { data, error } = await sb.from('base_conocimiento').select('*').eq('negocio', NEGOCIO).order('categoria').order('titulo');
    if (error || !data) return;
    documentos = data;
    renderizarBK();
  }

  function renderizarBK() {
    const categorias = [...new Set(documentos.map(d => d.categoria))];
    const container = document.getElementById('contenido-bk');

    const eventosHTML = `
      <div class="bloque" id="eventos-section">
        <div class="eventos-header">
          <div class="eventos-header-left" onclick="toggleEventosBody(this)">
            <h2>Eventos Públicos</h2>
            <span class="toggle" style="color:#555;font-size:18px;">▾</span>
          </div>
          <button class="btn-nuevo-evento" onclick="abrirModal(null)">＋ Nuevo evento</button>
        </div>
        <div id="eventos-body">
          <div class="eventos-filtros">
            <button class="filtro-btn active" id="filtro-todos" onclick="setFiltro('todos')">Todos</button>
            <button class="filtro-btn" id="filtro-activos" onclick="setFiltro('activos')">Activos</button>
            <button class="filtro-btn" id="filtro-inactivos" onclick="setFiltro('inactivos')">Inactivos</button>
          </div>
          <div class="eventos-grid" id="eventos-grid">
            <div class="eventos-empty">Cargando...</div>
          </div>
        </div>
      </div>
    `;

    const bkHTML = categorias.map(cat => {
      const docs = documentos.filter(d => d.categoria === cat);
      return `
        <div class="bloque">
          <div class="bloque-header" onclick="toggleBloque(this)">
            <h2>${cat}</h2>
            <span class="toggle">▾</span>
          </div>
          <div class="bloque-body">
            ${docs.map(doc => `
              <div class="campo">
                <label>${doc.titulo}</label>
                <textarea
                  id="field-${doc.id}"
                  rows="${Math.max(4, doc.contenido.split('\n').length + 1)}"
                  oninput="marcarModificado('${doc.id}', this)"
                >${doc.contenido}</textarea>
                <div class="campo-meta">
                  <span class="badge-${doc.estado}">${doc.estado}</span>
                  <span>v${doc.version}</span>
                  <span>Actualizado: ${new Date(doc.fecha_actualizacion).toLocaleDateString('es-MX')}</span>
                  <span>por ${doc.autor}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }).join('');

    container.innerHTML = eventosHTML + bkHTML;
    renderEventos();
  }

  function toggleBloque(header) {
    const body = header.nextElementSibling;
    const toggle = header.querySelector('.toggle');
    body.classList.toggle('collapsed');
    toggle.textContent = body.classList.contains('collapsed') ? '▸' : '▾';
  }

  function marcarModificado(id, textarea) {
    modificados[id] = textarea.value;
    textarea.classList.add('modified');
    document.getElementById('btn-guardar').disabled = Object.keys(modificados).length === 0;
  }

  async function guardarCambios() {
    const ids = Object.keys(modificados);
    let errores = 0;
    for (const id of ids) {
      const doc = documentos.find(d => d.id === id);
      const nuevoHistorial = [...(doc.historial_cambios || []), {
        autor: currentUser.username,
        fecha: new Date().toISOString(),
        accion: 'edicion'
      }];
      const { error } = await sb.from('base_conocimiento').update({
        contenido: modificados[id],
        autor: currentUser.username,
        fecha_actualizacion: new Date().toISOString(),
        version: (doc.version || 1) + 1,
        historial_cambios: nuevoHistorial
      }).eq('id', id);
      if (error) errores++;
    }
    modificados = {};
    document.getElementById('btn-guardar').disabled = true;
    document.querySelectorAll('textarea.modified').forEach(t => t.classList.remove('modified'));
    mostrarToast(errores === 0 ? 'Cambios guardados' : `${errores} error(es) al guardar`, errores > 0);
    await cargarBK();
  }

  function mostrarToast(msg, esError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = esError ? 'error' : '';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }

  // Verificar sesión al cargar
  const savedUser = sessionStorage.getItem('bk_user');
  if (savedUser) { currentUser = JSON.parse(savedUser); mostrarApp(); }
</script>
</body>
</html>
